<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://ssl.gstatic.com/keep/keep_2020q4.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keep - Google Keep Clone</title>
    
    <!-- Google Fonts: Poppins, Inter, Roboto, Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Google Material Symbols (Outlined) -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  </head>
  <body>
    <div class="app-container">
      <!-- Navbar Component -->
      <header class="navbar" id="app-navbar">
        <div class="nav-left">
          <button class="icon-btn" id="sidebar-toggle-btn" title="Main menu">
            <span class="material-symbols-outlined">menu</span>
          </button>
          <div class="nav-brand">
            <img src="https://www.gstatic.com/images/branding/product/1x/keep_2020q4_48dp.png" alt="Keep Logo" class="brand-logo" />
            <span class="brand-name">Keep</span>
          </div>
        </div>

        <div class="nav-center">
          <div class="search-container" id="search-bar-container">
            <button class="icon-btn search-icon-btn">
              <span class="material-symbols-outlined">search</span>
            </button>
            <input type="text" id="search-input" placeholder="Search" autocomplete="off" />
            <button class="icon-btn clear-search-btn" id="clear-search-btn" style="display: none;">
              <span class="material-symbols-outlined">close</span>
            </button>
          </div>
        </div>

        <div class="nav-right">
          <button class="icon-btn" id="nav-add-note-btn" title="Add note">
            <span class="material-symbols-outlined">add</span>
          </button>
          <button class="icon-btn" id="delete-all-btn" title="Delete all notes">
            <span class="material-symbols-outlined">delete_sweep</span>
          </button>
          <button class="icon-btn" id="refresh-btn" title="Refresh">
            <span class="material-symbols-outlined">refresh</span>
          </button>
          <button class="icon-btn" id="view-toggle-btn" title="List view">
            <span class="material-symbols-outlined" id="view-toggle-icon">view_list</span>
          </button>
          <button class="icon-btn" id="theme-toggle-btn" title="Toggle theme">
            <span class="material-symbols-outlined" id="theme-toggle-icon">dark_mode</span>
          </button>
          <button class="icon-btn" id="settings-btn" title="Settings">
            <span class="material-symbols-outlined">settings</span>
          </button>
          <div class="profile-avatar">
            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=80&q=80" alt="User Avatar" />
          </div>
        </div>
      </header>

      <!-- Main Layout -->
      <div class="main-layout">
        <!-- Sidebar / Navigation Drawer -->
        <aside class="sidebar" id="app-sidebar">
          <nav class="sidebar-nav">
            <a href="#" class="sidebar-item active" data-nav="notes">
              <span class="material-symbols-outlined">lightbulb</span>
              <span class="sidebar-label">Notes</span>
            </a>
            <a href="#" class="sidebar-item" data-nav="reminders">
              <span class="material-symbols-outlined">notifications</span>
              <span class="sidebar-label">Reminders</span>
            </a>
            <a href="#" class="sidebar-item" data-nav="edit-labels">
              <span class="material-symbols-outlined">edit</span>
              <span class="sidebar-label">Edit labels</span>
            </a>
            <a href="#" class="sidebar-item" data-nav="archive">
              <span class="material-symbols-outlined">archive</span>
              <span class="sidebar-label">Archive</span>
            </a>
            <a href="#" class="sidebar-item" data-nav="trash">
              <span class="material-symbols-outlined">delete</span>
              <span class="sidebar-label">Trash</span>
            </a>
          </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="content-container">
          <!-- Take Note Expander Card -->
          <section class="note-creator-section">
            <form class="note-creator-form" id="note-form" autocomplete="off">
              <!-- Collapsed Input State -->
              <div class="note-creator-collapsed" id="note-creator-collapsed">
                <input type="text" placeholder="Take a note..." readonly id="dummy-input" />
                <div class="collapsed-actions">
                  <button type="button" class="icon-btn" title="New list">
                    <span class="material-symbols-outlined">check_box</span>
                  </button>
                  <button type="button" class="icon-btn" title="New note with drawing">
                    <span class="material-symbols-outlined">brush</span>
                  </button>
                  <button type="button" class="icon-btn" title="New note with image">
                    <span class="material-symbols-outlined">image</span>
                  </button>
                </div>
              </div>

              <!-- Expanded Input State -->
              <div class="note-creator-expanded" id="note-creator-expanded" style="display: none;">
                <div class="note-image-preview-container" id="creator-image-preview-container" style="display: none;">
                  <img src="" id="creator-image-preview" alt="Preview" />
                  <button type="button" class="remove-image-btn" id="creator-remove-image-btn" title="Remove image">
                    <span class="material-symbols-outlined">close</span>
                  </button>
                </div>

                <div class="note-title-wrapper">
                  <input type="text" id="note-title" placeholder="Title" />
                  <button type="button" class="icon-btn pin-btn" id="note-creator-pin-btn" title="Pin note">
                    <span class="material-symbols-outlined" id="note-creator-pin-icon">keep</span>
                  </button>
                </div>
                
                <div class="note-text-wrapper">
                  <textarea id="note-text" placeholder="Take a note..." rows="1"></textarea>
                </div>

                <div class="note-creator-footer">
                  <div class="creator-toolbar">
                    <div style="position: relative;">
                      <button type="button" class="icon-btn" id="creator-reminder-btn" title="Remind me">
                        <span class="material-symbols-outlined">add_alert</span>
                      </button>
                      <!-- Custom DateTime Picker Popover -->
                      <div class="datetime-picker-popover" id="creator-datetime-popover" style="display: none;">
                        <label>Set Reminder:</label>
                        <input type="datetime-local" id="creator-reminder-input" />
                        <div class="datetime-actions">
                          <button type="button" class="dt-clear-btn" id="creator-dt-clear">Clear</button>
                          <button type="button" class="dt-save-btn" id="creator-dt-save">Save</button>
                        </div>
                      </div>
                    </div>

                    <div style="position: relative;">
                      <button type="button" class="icon-btn" id="creator-label-menu-btn" title="Change labels">
                        <span class="material-symbols-outlined">label</span>
                      </button>
                      <!-- Labels Checklist Dropdown -->
                      <div class="labels-checklist-dropdown" id="creator-labels-dropdown" style="display: none;">
                        <!-- Dynamic checkboxes will be added here -->
                      </div>
                    </div>

                    <button type="button" class="icon-btn" id="color-palette-btn" title="Background options">
                      <span class="material-symbols-outlined">palette</span>
                    </button>

                    <button type="button" class="icon-btn" id="creator-image-btn" title="Add image">
                      <span class="material-symbols-outlined">image</span>
                    </button>
                    <input type="file" id="creator-image-input" accept="image/*" style="display: none;" />

                    <button type="button" class="icon-btn" id="archive-creator-btn" title="Archive">
                      <span class="material-symbols-outlined">archive</span>
                    </button>
                    <button type="button" class="icon-btn" title="More">
                      <span class="material-symbols-outlined">more_vert</span>
                    </button>
                  </div>
                  <button type="button" class="close-btn" id="note-creator-close-btn">Close</button>
                </div>

                <!-- Color Palette Popover -->
                <div class="color-palette-picker" id="color-picker-popover" style="display: none;">
                  <button type="button" class="color-dot default active" data-color="default" title="Default" style="background-color: var(--note-bg-default);"></button>
                  <button type="button" class="color-dot coral" data-color="coral" title="Coral" style="background-color: var(--note-bg-coral);"></button>
                  <button type="button" class="color-dot peach" data-color="peach" title="Peach" style="background-color: var(--note-bg-peach);"></button>
                  <button type="button" class="color-dot sand" data-color="sand" title="Sand" style="background-color: var(--note-bg-sand);"></button>
                  <button type="button" class="color-dot mint" data-color="mint" title="Mint" style="background-color: var(--note-bg-mint);"></button>
                  <button type="button" class="color-dot sage" data-color="sage" title="Sage" style="background-color: var(--note-bg-sage);"></button>
                  <button type="button" class="color-dot fog" data-color="fog" title="Fog" style="background-color: var(--note-bg-fog);"></button>
                  <button type="button" class="color-dot storm" data-color="storm" title="Storm" style="background-color: var(--note-bg-storm);"></button>
                  <button type="button" class="color-dot dusk" data-color="dusk" title="Dusk" style="background-color: var(--note-bg-dusk);"></button>
                  <button type="button" class="color-dot blossom" data-color="blossom" title="Blossom" style="background-color: var(--note-bg-blossom);"></button>
                  <button type="button" class="color-dot clay" data-color="clay" title="Clay" style="background-color: var(--note-bg-clay);"></button>
                </div>
              </div>
            </form>
          </section>

          <!-- Notes Grid Workspace -->
          <section class="notes-workspace">
            <!-- Pinned Notes Container -->
            <div class="notes-section" id="pinned-section" style="display: none;">
              <h3 class="section-title">PINNED</h3>
              <div class="notes-grid" id="pinned-grid"></div>
            </div>

            <!-- Other Notes Container -->
            <div class="notes-section" id="others-section">
              <h3 class="section-title" id="others-title" style="display: none;">OTHERS</h3>
              <div class="notes-grid" id="others-grid"></div>
            </div>
            
            <!-- Empty State Container -->
            <div class="empty-state" id="empty-state" style="display: none;">
              <span class="material-symbols-outlined empty-icon">lightbulb</span>
              <p class="empty-text">Notes you add appear here</p>
            </div>
          </section>
        </main>
      </div>
    </div>

    <!-- Edit Note Dialog/Modal -->
    <div class="modal-overlay" id="edit-note-modal" style="display: none;">
      <div class="modal-card" id="modal-card">
        <div class="modal-image-preview-container" id="modal-image-preview-container" style="display: none;">
          <img src="" id="modal-image-preview" alt="Preview" />
          <button type="button" class="remove-image-btn" id="modal-remove-image-btn" title="Remove image">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
        <div class="modal-header">
          <input type="text" id="modal-title" placeholder="Title" />
          <button type="button" class="icon-btn pin-btn" id="modal-pin-btn" title="Pin note">
            <span class="material-symbols-outlined" id="modal-pin-icon">keep</span>
          </button>
        </div>
        <div class="modal-body">
          <textarea id="modal-text" placeholder="Note" rows="3"></textarea>
        </div>
        <div class="modal-footer">
          <div class="modal-toolbar">
            <div style="position: relative;">
              <button type="button" class="icon-btn" id="modal-reminder-btn" title="Remind me">
                <span class="material-symbols-outlined">add_alert</span>
              </button>
              <!-- Modal DateTime Picker Popover -->
              <div class="datetime-picker-popover" id="modal-datetime-popover" style="display: none;">
                <label>Set Reminder:</label>
                <input type="datetime-local" id="modal-reminder-input" />
                <div class="datetime-actions">
                  <button type="button" class="dt-clear-btn" id="modal-dt-clear">Clear</button>
                  <button type="button" class="dt-save-btn" id="modal-dt-save">Save</button>
                </div>
              </div>
            </div>

            <div style="position: relative;">
              <button type="button" class="icon-btn" id="modal-label-menu-btn" title="Change labels">
                <span class="material-symbols-outlined">label</span>
              </button>
              <div class="labels-checklist-dropdown" id="modal-labels-dropdown" style="display: none;">
                <!-- Dynamic checkboxes -->
              </div>
            </div>

            <button type="button" class="icon-btn" id="modal-color-btn" title="Background options">
              <span class="material-symbols-outlined">palette</span>
            </button>

            <button type="button" class="icon-btn" id="modal-image-btn" title="Add image">
              <span class="material-symbols-outlined">image</span>
            </button>
            <input type="file" id="modal-image-input" accept="image/*" style="display: none;" />

            <button type="button" class="icon-btn" id="modal-archive-btn" title="Archive">
              <span class="material-symbols-outlined">archive</span>
            </button>
            <button type="button" class="icon-btn" id="modal-delete-btn" title="Delete note">
              <span class="material-symbols-outlined">delete</span>
            </button>
          </div>
          <button type="button" class="close-btn" id="modal-save-btn">Save</button>
        </div>
        <!-- Modal Color Palette Popover -->
        <div class="color-palette-picker" id="modal-color-picker-popover" style="display: none;">
          <button type="button" class="color-dot default" data-color="default" title="Default" style="background-color: var(--note-bg-default);"></button>
          <button type="button" class="color-dot coral" data-color="coral" title="Coral" style="background-color: var(--note-bg-coral);"></button>
          <button type="button" class="color-dot peach" data-color="peach" title="Peach" style="background-color: var(--note-bg-peach);"></button>
          <button type="button" class="color-dot sand" data-color="sand" title="Sand" style="background-color: var(--note-bg-sand);"></button>
          <button type="button" class="color-dot mint" data-color="mint" title="Mint" style="background-color: var(--note-bg-mint);"></button>
          <button type="button" class="color-dot sage" data-color="sage" title="Sage" style="background-color: var(--note-bg-sage);"></button>
          <button type="button" class="color-dot fog" data-color="fog" title="Fog" style="background-color: var(--note-bg-fog);"></button>
          <button type="button" class="color-dot storm" data-color="storm" title="Storm" style="background-color: var(--note-bg-storm);"></button>
          <button type="button" class="color-dot dusk" data-color="dusk" title="Dusk" style="background-color: var(--note-bg-dusk);"></button>
          <button type="button" class="color-dot blossom" data-color="blossom" title="Blossom" style="background-color: var(--note-bg-blossom);"></button>
          <button type="button" class="color-dot clay" data-color="clay" title="Clay" style="background-color: var(--note-bg-clay);"></button>
        </div>
      </div>
    </div>

    <!-- Edit Labels Dialog/Modal -->
    <div class="modal-overlay" id="edit-labels-modal" style="display: none;">
      <div class="modal-card labels-modal-card">
        <div class="modal-header">
          <h3>Edit labels</h3>
        </div>
        <div class="modal-body">
          <div class="label-create-input-wrapper">
            <input type="text" id="new-label-input" placeholder="Create new label" autocomplete="off" />
            <button type="button" class="icon-btn" id="create-label-btn" title="Create label">
              <span class="material-symbols-outlined">add</span>
            </button>
          </div>
          <div class="labels-list" id="labels-list-container">
            <!-- Dynamic label items go here -->
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="close-btn" id="labels-modal-close-btn">Done</button>
        </div>
      </div>
    </div>

    <!-- Settings Dialog/Modal -->
    <div class="modal-overlay" id="settings-modal" style="display: none;">
      <div class="modal-card settings-modal-card">
        <div class="modal-header">
          <h3>Settings</h3>
        </div>
        <div class="modal-body">
          <div class="settings-group">
            <label for="settings-font">App Font Style</label>
            <select id="settings-font">
              <option value="Outfit">Outfit (Default)</option>
              <option value="Poppins">Poppins</option>
              <option value="Inter">Inter</option>
              <option value="Roboto">Roboto</option>
              <option value="system-ui">System UI</option>
            </select>
          </div>
          <div class="settings-group">
            <label for="settings-density">Layout Spacing</label>
            <select id="settings-density">
              <option value="comfortable">Comfortable</option>
              <option value="compact">Compact</option>
            </select>
          </div>
          <div class="settings-group danger-zone">
            <h4>Data Management</h4>
            <button type="button" class="danger-btn" id="settings-reset-btn">Reset All Application Data</button>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="close-btn" id="settings-modal-close-btn">Done</button>
        </div>
      </div>
    </div>

    <!-- Toast Notification Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Script Entry Point -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
